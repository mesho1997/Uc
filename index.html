<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UC SHOP - PUBG | شحن شدات ببجي - فودافون كاش</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070') center/cover fixed;
            background-blend-mode: overlay;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            z-index: 2;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 60px;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #eee;
            margin-top: 10px;
        }

        .player-id-card {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 30px;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            border: 1px solid #FFD700;
        }

        .player-id-card label {
            color: #FFD966;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .player-id-card input {
            flex: 2;
            min-width: 250px;
            padding: 15px 20px;
            border-radius: 60px;
            border: none;
            background: #1e1e2f;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .player-id-card button {
            background: #FF8C00;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            color: #1e1e2f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .player-id-card button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px #FF8C00;
        }

        /* منطقة عرض اسم اللاعب */
        .player-info {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid #FFD700;
            display: none;
        }

        .player-info.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .player-name {
            font-size: 1.4rem;
            color: #FFD966;
            font-weight: bold;
        }

        .player-name i {
            margin-left: 10px;
            color: #FF8C00;
        }

        .fetch-status {
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .fetch-status.loading {
            color: #FFD966;
        }

        .fetch-status.success {
            color: #27ae60;
        }

        .fetch-status.error {
            color: #e74c3c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 25px 15px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 140, 0, 0.5);
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
        }

        .card.selected {
            border: 2px solid #FFD700;
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 20px #FFD700;
        }

        .uc-icon {
            width: 55px;
            height: 55px;
            object-fit: contain;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 6px #FFD700);
        }

        .uc-amount {
            font-size: 1.9rem;
            font-weight: bold;
            color: #FFD966;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .uc-amount span {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.9rem;
        }

        .price {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            display: inline-block;
            padding: 5px 25px;
            border-radius: 40px;
            margin-top: 10px;
            color: #1e1e2f;
        }

        .badge-hot {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #E74C3C;
            color: white;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .payment-section {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            border: 1px solid #FF8C00;
        }

        .vodafone-badge {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            padding: 15px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 25px;
            width: 100%;
            justify-content: center;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #25D366, #075E54);
            border: none;
            padding: 18px 45px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #25D366;
        }

        .note {
            margin-top: 20px;
            color: #FFD966;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #aaa;
        }

        @media (max-width: 700px) {
            .uc-icon { width: 45px; height: 45px; }
            .uc-amount { font-size: 1.5rem; }
            .price { font-size: 1.3rem; }
            .player-name { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-crown"></i> UC SHOP - PUBG <i class="fas fa-gamepad"></i></h1>
        <p>🔫 أسرع شحن شدات ببجي | دفع فودافون كاش فقط 🔫</p>
    </div>

    <div class="player-id-card">
        <label><i class="fas fa-id-card"></i> معرف اللاعب:</label>
        <input type="text" id="playerID" placeholder="أدخل رقم ID الخاص بك في ببجي" value="">
        <button id="fetchNameBtn"><i class="fas fa-search"></i> جلب الاسم</button>
        <button id="saveIDBtn"><i class="fas fa-save"></i> حفظ</button>
    </div>

    <!-- عرض اسم اللاعب -->
    <div class="player-info" id="playerInfo">
        <div class="player-name" id="playerName">
            <i class="fas fa-user"></i> <span id="displayName">---</span>
        </div>
        <div class="fetch-status" id="fetchStatus"></div>
    </div>

    <div class="products-grid" id="productsGrid"></div>

    <div class="payment-section">
        <div class="vodafone-badge">
            <i class="fas fa-mobile-alt"></i> الدفع عبر فودافون كاش فقط
            <i class="fas fa-check-circle"></i>
        </div>
        <button class="checkout-btn" id="checkoutBtn">
            <i class="fab fa-whatsapp"></i> شحن الآن عبر واتساب
        </button>
        <div class="note">
            <i class="fas fa-info-circle"></i> سيتم تحويلك إلى واتساب لإرسال بيانات الطلب
        </div>
    </div>
    <footer>
        <i class="fas fa-shield-alt"></i> شحن فوري بعد تأكيد الدفع
    </footer>
</div>

<script>
    // ⭐⭐⭐ استخدم الصورة المحلية (حطها في نفس مجلد الموقع وسميها uc-icon.png) ⭐⭐⭐
    const UC_IMAGE = "uc-icon.png";
    
    const products = [
        { id: 1, uc: 30, price: 25 },
        { id: 2, uc: 60, price: 45 },
        { id: 3, uc: 325, price: 215 },
        { id: 4, uc: 660, price: 425 },
        { id: 5, uc: 1800, price: 1055 },
        { id: 6, uc: 3850, price: 2105 },
        { id: 7, uc: 8100, price: 4205 }
    ];

    let selectedProduct = products[0];
    let savedPlayerID = "";
    let fetchedPlayerName = "";

    // دالة جلب اسم اللاعب (محاكاة للتجربة)
    async function fetchPlayerNameFromID(playerID) {
        const statusDiv = document.getElementById("fetchStatus");
        const playerInfoDiv = document.getElementById("playerInfo");
        const displayNameSpan = document.getElementById("displayName");
        
        playerInfoDiv.classList.add("show");
        statusDiv.className = "fetch-status loading";
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري جلب اسم اللاعب...';
        displayNameSpan.innerText = "جاري البحث...";
        
        // محاكاة لجلب الاسم (للتجربة)
        return new Promise((resolve) => {
            setTimeout(() => {
                // أسماء تجريبية للعرض
                const demoNames = {
                    "51205752964": "xVIB MESH6",
                    "62208942440580392": "Mesho 7oTPUPG"
                };
                
                let playerName = demoNames[playerID];
                if (!playerName && playerID.length >= 8) {
                    playerName = `Player_${playerID.slice(-4)}`;
                } else if (!playerName) {
                    playerName = "لاعب PUBG";
                }
                
                fetchedPlayerName = playerName;
                displayNameSpan.innerText = playerName;
                statusDiv.className = "fetch-status success";
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> تم جلب الاسم بنجاح';
                resolve(playerName);
            }, 1000);
        });
    }

    document.getElementById("fetchNameBtn").addEventListener("click", async () => {
        const playerID = document.getElementById("playerID").value.trim();
        if (!playerID) {
            alert("⚠️ من فضلك أدخل معرف اللاعب أولاً!");
            return;
        }
        await fetchPlayerNameFromID(playerID);
    });

    function renderProducts() {
        const container = document.getElementById("productsGrid");
        container.innerHTML = "";
        products.forEach(prod => {
            const card = document.createElement("div");
            card.classList.add("card");
            if (selectedProduct && selectedProduct.id === prod.id) card.classList.add("selected");
            
            let innerHtml = `
                <img src="${UC_IMAGE}" class="uc-icon" alt="UC" onerror="this.src='https://via.placeholder.com/50?text=UC'">
                <div class="uc-amount">
                    <span>${prod.uc}</span>
                </div>
                <div class="price">${prod.price} جنيه</div>
            `;
            
            if (prod.uc === 30) {
                innerHtml = `<div class="badge-hot">🔥 اقتصادية</div>` + innerHtml;
            }
            
            card.innerHTML = innerHtml;
            
            card.addEventListener("click", () => {
                document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
                card.classList.add("selected");
                selectedProduct = prod;
            });
            container.appendChild(card);
        });
    }

    function generateWhatsAppMessage(playerID, product, playerName) {
        let nameText = playerName ? `🎮 اسم اللاعب: ${playerName}\n` : '';
        return encodeURIComponent(
            `🛍️ طلب شحن شدات ببجي 🛍️\n` +
            `━━━━━━━━━━━━━━━━━━━\n` +
            `👤 معرف اللاعب: ${playerID}\n` +
            `${nameText}` +
            `🎮 كمية UC: ${product.uc} UC\n` +
            `💰 السعر: ${product.price} جنيه\n` +
            `💳 الدفع: فودافون كاش\n` +
            `━━━━━━━━━━━━━━━━━━━\n` +
            `📱 رقم فودافون كاش: 01151888199\n` +
            `✅ أرسل تأكيد الدفع بعد التحويل\n` +
            `✨ شكراً لك ❤️`
        );
    }

    document.getElementById("saveIDBtn").addEventListener("click", () => {
        const id = document.getElementById("playerID").value.trim();
        if (id) {
            savedPlayerID = id;
            const notif = document.createElement("div");
            notif.innerText = "✅ تم حفظ المعرف: " + id;
            notif.style.position = "fixed";
            notif.style.bottom = "20px";
            notif.style.left = "50%";
            notif.style.transform = "translateX(-50%)";
            notif.style.backgroundColor = "#27ae60";
            notif.style.color = "white";
            notif.style.padding = "12px 25px";
            notif.style.borderRadius = "50px";
            notif.style.zIndex = "9999";
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        } else {
            alert("⚠️ أدخل معرف اللاعب أولاً");
        }
    });

    document.getElementById("checkoutBtn").addEventListener("click", () => {
        let playerID = document.getElementById("playerID").value.trim();
        if (!playerID) {
            alert("⚠️ أدخل معرف اللاعب!");
            return;
        }
        if (!selectedProduct) {
            alert("⚠️ اختر كمية UC!");
            return;
        }
        const phoneNumber = "201151888199";
        const whatsappUrl = `https://wa.me/${phoneNumber}?text=${generateWhatsAppMessage(playerID, selectedProduct, fetchedPlayerName)}`;
        window.open(whatsappUrl, "_blank");
    });

    renderProducts();
</script>
</body>
</html>
